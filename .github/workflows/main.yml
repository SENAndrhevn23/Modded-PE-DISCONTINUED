jobs:
  build-windows:
    name: Build Modded-PE for Windows
    runs-on: windows-2022

    steps:
      - uses: actions/checkout@v3

      - name: Install Haxe 4.3.4
        shell: powershell
        run: |
          choco install haxe --version=4.3.4 -y
          $env:Path = "${env:ProgramData}\chocolatey\lib\haxe\tools\haxe;%env:Path%"
          haxe --version
          haxelib list

      - name: Install Lime & OpenFL
        run: |
          haxelib install lime
          haxelib install openfl
          haxelib run lime setup
          haxelib run openfl setup

      - name: Clean previous Windows build
        run: lime clean windows

      - name: Build Windows
        run: lime build windows -release

      - name: Upload Windows build artifact
        uses: actions/upload-artifact@v4
        with:
          name: Modded-PE_Windows
          path: export/release/windows/bin/*
