name: Build MODDED-PE

on:
  push:
    branches: [ main, experimental ]
  pull_request:
    branches: [ main, experimental ]
  workflow_dispatch:

jobs:
# =========================
# LINUX BUILD
# =========================
  build-linux:
    name: Linux Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Haxe
        uses: krdlab/setup-haxe@master
        with:
          haxe-version: 4.3.4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libvlc-dev libvlccore-dev

      - name: Install Haxelib + Psych setup
        run: |
          haxelib setup ~/haxelib
          haxelib install hxcpp --quiet
          chmod +x setup/unix.sh
          sh setup/unix.sh

      - name: Skip SScript setup
        run: echo 'oy9:showMacroty8:loopCosti25y10:includeAllfg' >> ~/settings.cocoa

      - name: Set build version
        run: echo "${{ github.run_id }}" > VERSION

      - name: Build Linux
        run: |
          haxelib run lime build Project.xml linux \
            --app-version="4.0.0-${{ github.run_id }}" \
            -D officialBuild

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: MODDED-PE_Linux
          path: export/release/linux/bin


# =========================
# WINDOWS BUILD
# =========================
  build-windows:
    name: Windows Build
    runs-on: windows-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Haxe
        uses: krdlab/setup-haxe@master
        with:
          haxe-version: 4.3.4

      - name: Install Haxelib + Psych setup
        shell: cmd
        run: |
          haxelib setup C:\haxelib
          haxelib install hxcpp > NUL
          call setup\windows.bat

      - name: Skip SScript setup
        shell: cmd
        run: echo oy9:showMacroty8:loopCosti25y10:includeAllfg >> %USERPROFILE%\settings.cocoa

      - name: Set build version
        shell: cmd
        run: echo %GITHUB_RUN_ID% > VERSION

      - name: Build Windows
        shell: cmd
        run: |
          haxelib run lime build Project.xml windows ^
            --app-version="4.0.0-%GITHUB_RUN_ID%" ^
            -D officialBuild

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: MODDED-PE_Windows
          path: export/release/windows/bin
