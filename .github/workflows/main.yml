name: Build the game

on:
  pull_request:
    branches: [master]
  push:
    branches: [developmentalist]
  workflow_dispatch:

jobs:
  BuildWindows:
    name: Build Windows
    runs-on: windows-2022
    uses: ./.github/workflows/build.yml
    with:
      name: Windows
      os: windows-2022
      buildArgs: windows
      exportPath: windows
      artifactName: Modded-PE_0.0.1_windows
      artifactPath: export\release\windows\bin\*
      cachePath: Modded-PE.build-windows
      cacheLibrariesPath: Modded-PE.desktop-cache
