name: Build the game

on:
  pull_request:
    branches: [master]
  push:
    branches: [developmentalist]
  workflow_dispatch:

jobs:
  build:
    name: ${{ matrix.name }}
    permissions: write-all
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux
            os: ubuntu-22.04
            target: linux
            artifactName: Modded-PE-0.0.1_linux
            artifactPath: export/release/linux/bin/*

          - name: Windows
            os: windows-2022
            target: windows
            artifactName: Modded-PE-0.0.1_windows
            artifactPath: export/release/windows/bin/*

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Haxe
        uses: krdlab/setup-haxe@v1
        with:
          haxe-version: 4.3.4

      - name: Set up haxelib
        run: haxelib setup $HOME/haxelib

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt update
          sudo apt install -y \
            libgl1-mesa-dev \
            libglu1-mesa-dev \
            libx11-dev \
            libxrandr-dev \
            libxi-dev \
            libxcursor-dev \
            libxinerama-dev \
            libasound2-dev \
            libpulse-dev

      - name: Install Haxe libraries
        run: |
          haxelib install lime --quiet
          haxelib install openfl --quiet
          haxelib install hxcpp --quiet

          # Psych Engine / H-Slice libraries
          haxelib install flixel --quiet
          haxelib install flixel-addons --quiet
          haxelib install tjson --quiet
          haxelib install FlxPartialSound --quiet
          haxelib install grig.audio --quiet
          haxelib install funkin.vis --quiet
          haxelib install linc_luajit --quiet
          haxelib install hscript-iris --quiet
          haxelib install hxCodec --quiet
          haxelib install hxvlc --quiet
          haxelib install hxdiscord_rpc --quiet
          haxelib install flxanimate --quiet
          haxelib install extension-androidtools --quiet

      - name: Rebuild hxcpp
        run: haxelib run hxcpp Build.xml || true

      - name: Lime setup
        run: haxelib run lime setup

      - name: Build (${{ matrix.target }})
        run: |
          set -x
          haxelib run lime build ${{ matrix.target }} -release -verbose

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifactName }}
          path: ${{ matrix.artifactPath }}
