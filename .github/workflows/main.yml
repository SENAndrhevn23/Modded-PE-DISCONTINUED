name: Build the game

on:
  pull_request:
    branches: [master]
  push:
    branches: [developmentalist]
  workflow_dispatch:

jobs:
  BuildWindows:
    name: Build Windows
    runs-on: windows-2022

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Haxe
        uses: haxe/setup-haxe@v1
        with:
          haxe-version: '4.3.0'

      - name: Install dependencies
        run: haxelib install lime openfl

      - name: Clean build
        run: lime clean windows

      - name: Build Windows
        run: lime build windows

      - name: Upload artifact
        uses: actions/upload-artifact@v3
        with:
          name: Modded-PE_0.0.1_windows
          path: export/release/windows/bin/
